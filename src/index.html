<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/png" href="../img/rook.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <title>Chessmate | Sign up</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <a href="index.html">
          <img class="logo" src="/img/main-logo.png" alt="" />
        </a>
        <div class="header-right">
          <div><i class="fas fa-envelope"></i> contact@chessmate.com</div>
          <div><i class="fas fa-phone"></i> (+20) 1234567890</div>
          <a href=""><i class="fa-brands fa-twitter"></i></a>
        </div>
      </header>
      <main class="main-content">
        <form>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message"></textarea>
          </div>
          <div class="form-group">
            <button type="submit" class="btn">Submit</button>
          </div>
        </form>

        <div class="text-container">
          <h1>Every Great Game Starts With One Move</h1>
          <p>
            Join a community built for players who think three moves ahead.
            Whether you're just learning the openings or hunting your next
            rating milestone, sign up below and make your move.
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
